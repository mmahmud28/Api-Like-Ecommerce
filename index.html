<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Document</title>
</head>

<body>
    <main class="container mx-auto space-y-5 bg-gray-100">
        <h2 class="cg font-bold text-center text-3xl">Choose Your Tree</h2>
        <div class="grid grid-cols-12 gap-5">

            <div class="col-span-3 space-y-5 card shadow-2xl p-5">
                <h2 class="cg text-2xl font-bold">Categories</h2>
                <div class="space-y-3 sticky top-10">
                    <button id="allCategoryBtn" class="btn btn-primary mb-5 w-full">All Trees</button>
                    <div id="categories-container" class="card shadow-sm"></div>
                </div>
            </div>

            <div id="card-container" class="col-span-6">
                <div id="trees-contailner" class="grid grid-cols-1 sm:grid-cols-3 gap-6 cursor-pointer"></div>
                <div id="loading-spnner" class="h-[60vh] hidden flex justify-center items-center">
                    <progress class="progress w-56"></progress>
                </div>
            </div>

            <div class="col-span-3 p-4 card shadow-2xl">
                <h2 class="font-bold text-3xl">Card</h2>

                <div class="space-y-5">
                    <div id="cart-container" class="space-y-4">
                        
                    </div>

                    <div id="Emty-Card" class="text-center py-4 card shadow-2xl">
                        <span class="w-full h-10"><i class="fa-solid fa-cart-shopping"></i></span>
                        <p class="font-bold">Your Card Is Emty!</p>
                        <p class="font-semibold">Add Trees to get started</p>
                    </div>


                    <div class="flex justify-between items-center bg-green-50 rounded-lg p-4 my-3 font-bold">
                        <span>Total:</span>
                        <span id="totalprice">0</span>
                    </div>

                </div>

            </div>
        </div>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->

        <dialog id="tree_modal" class="modal">
            <div class="modal-box">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-2xl to-green-700" id="modal-title"></h3>
                        <button class="btn btn-sm btn-circle btn-ghost"
                            onclick="document.getElementById('tree_modal').close()">X</button>
                    </div>

                    <div class="mb-4">
                        <img id="Modal-Image" class="w-full h-[250px] object-cover rounded-lg" src="" alt="">
                    </div>

                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modal-category" class="badge badge-primary"></span>
                        </p>

                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modal-description"></span>
                        </p>

                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold to-green-600">৳<span id="modalPricid">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
    <script src="/script.js"></script>
</body>

</html>
